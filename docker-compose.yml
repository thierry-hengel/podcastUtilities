services:
  # Main service for the Streamlit Web Interface
  podcast-utilities:
    image: thierryhengel/podcast-utilities:latest
    container_name: podcast-utilities_web

    # Startup command for the Streamlit interface
    # Explicitly binding to 0.0.0.0 and port 8501 for container network access
    command: ["streamlit", "run", "podcastUtilities.py", "--server.port=8501", "--server.address=0.0.0.0"]

    # Map the host port 8501 to the container port 8501
    # Access via http://localhost:8501 or http://<your-ip>:8501
    ports:
      - "8501:8501"

    # Load environment variables (API keys, DB credentials, etc.)
    env_file: .env

    # Volumes ensure your data persists even if the container is updated
    volumes:
      - ./configuration:/app/configuration       # Persistent configuration files
      - ./downloads:/app/downloads # Files downloaded by Selenium
      - ./profiles:/app/profiles   # Firefox browser sessions (auth persistence)
      - ./logs:/app/logs           # Application logs

    # Automatically restart the service if it crashes or the system reboots
    restart: always

